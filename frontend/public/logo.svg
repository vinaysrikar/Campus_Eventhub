<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Rounded square background -->
  <rect width="40" height="40" rx="10" fill="url(#logoGrad)"/>
  <!-- Hub circle center -->
  <circle cx="20" cy="20" r="4" fill="white" opacity="0.95"/>
  <!-- 4 event nodes connected to hub -->
  <circle cx="20" cy="9" r="3" fill="white" opacity="0.85"/>
  <circle cx="31" cy="20" r="3" fill="white" opacity="0.85"/>
  <circle cx="20" cy="31" r="3" fill="white" opacity="0.85"/>
  <circle cx="9" cy="20" r="3" fill="white" opacity="0.85"/>
  <!-- Connector lines -->
  <line x1="20" y1="16" x2="20" y2="12" stroke="white" stroke-width="1.5" stroke-opacity="0.7" stroke-linecap="round"/>
  <line x1="24" y1="20" x2="28" y2="20" stroke="white" stroke-width="1.5" stroke-opacity="0.7" stroke-linecap="round"/>
  <line x1="20" y1="24" x2="20" y2="28" stroke="white" stroke-width="1.5" stroke-opacity="0.7" stroke-linecap="round"/>
  <line x1="16" y1="20" x2="12" y2="20" stroke="white" stroke-width="1.5" stroke-opacity="0.7" stroke-linecap="round"/>
  <!-- Diagonal small nodes -->
  <circle cx="28" cy="12" r="2" fill="white" opacity="0.5"/>
  <circle cx="12" cy="28" r="2" fill="white" opacity="0.5"/>
  <line x1="22" y1="18" x2="26.5" y2="13.5" stroke="white" stroke-width="1" stroke-opacity="0.4" stroke-linecap="round"/>
  <line x1="18" y1="22" x2="13.5" y2="26.5" stroke="white" stroke-width="1" stroke-opacity="0.4" stroke-linecap="round"/>
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
</svg>
